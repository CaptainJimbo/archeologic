name: deploy-pages

# Builds the graph + web app and publishes it to GitHub Pages.
#
# Auto-deploys on every push to main — the wiki is the source of truth, so any
# change to it (or the tooling/UI) rebuilds graph.json and republishes the live
# site. Also runnable manually from the Actions tab. Note: the published site
# bakes the full wiki content into graph.json, so it is public.
#
# Pages source is "GitHub Actions" (repo is public → free). Path filter keeps
# doc-only tweaks from triggering a pointless redeploy.

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "web/**"
      - "tools/build_graph.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# never run two publishes at once; let a newer run supersede an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build graph.json from the wiki (source of truth)
        run: python tools/build_graph.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build the web app
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
