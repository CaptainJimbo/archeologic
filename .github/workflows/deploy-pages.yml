name: deploy-pages

# Builds the graph + web app and publishes it to GitHub Pages.
#
# ⚠️ Publishing is a PUBLIC, outward-facing action: the built site (including the
# full wiki content baked into graph.json) becomes visible on the web, even while
# this repository stays private. It therefore runs ONLY on manual dispatch — it
# will never publish on a push by itself. To auto-deploy on every push to main
# later, uncomment the `push:` trigger below.
#
# Prerequisites (one-time):
#   1. GitHub Pages from a PRIVATE repo requires a paid plan (GitHub Pro is
#      enough). On the free plan the repo must be public.
#   2. Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions".
# Then run this workflow from the Actions tab (Run workflow).

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# never run two publishes at once; let a newer run supersede an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build graph.json from the wiki (source of truth)
        run: python tools/build_graph.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build the web app
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
